<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- cài đặt font poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      html {
        font-family: 'Poppins', sans-serif;
      }
    </style>
    <link rel="stylesheet" href="productInfor.css" />
  </head>
  <body>
    <div class="product flex-left">
      <div class="product-img">
        <img
          class="img"
          src="../imges/product-headphone.png"
          alt="Razer Kraken Kitty Edt Gaming Headset Quartz"
        />
      </div>
      <div class="product-contents ">
        <div class="form-group">
          <p class="badge">Free shipping</p>
          <h2>Razer Kraken Kitty Edt Gaming Headset Quartz</h2>
        </div>
        <div class="form-group">
          <p class="old-price"><del>1 599,000</del></p>
          <div class="new-price">799,000</div>
          <p class="time-product">
            The offer is valid until April 3 or as long as stock lasts!
          </p>
        </div>
        <div class="form-group">
        <button class="btn-primary w-100">Add to cart</button>
        </div>
        <div class="form-group ">
            <p><span class="dot"></span>50+ pcs. in stock.</p>
          </div>
          <div class="btn-group flex-center">
          <button class="btn-secondary w-100">
            <i class="fa-solid fa-scale-balanced"></i>Add to cart
          </button>

          <button class="btn-secondary w-100">
            <i class="fa-regular fa-heart"></i>Add to wishlist
          </button>
        </div>
        </div>
      </div>
    </div>
  </body>
</html>
